<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TackPath — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&family=DM+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#19b7ef;--green:#53ff88;--orange:#ff961e;--red:#ff3b30;--purple:#8d5cff;
  --bg:#02060e;--card:#071828;
}
html,body{height:100%;background:#000;overflow:hidden;font-family:'DM Sans',sans-serif;}

/* ── STAGE ── */
#stage{position:fixed;inset:0;background:#000;}

/* ── IFRAME VIEWPORT ── */
#viewport{
  position:absolute;
  width:1440px;height:900px;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(var(--vscale,0.7));
  transform-origin:center center;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 40px 120px rgba(0,0,0,.9);
  transition:transform 1.2s cubic-bezier(.25,.46,.45,.94);
}
#viewport iframe{
  width:100%;height:100%;border:0;
  pointer-events:none;
}

/* ── ZOOM LENS OVERLAY ── */
#lens{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  background:rgba(0,0,0,0);
  transition:background 0.4s;
}

/* ── CAPTION ── */
#caption{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  z-index:200;text-align:center;pointer-events:none;
  opacity:0;transition:opacity .4s;
}
#caption .cap-label{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
  color:var(--blue);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;
}
#caption .cap-text{
  font-size:22px;font-weight:800;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}

/* ── HIGHLIGHT SPOTLIGHT ── */
#spotlight{
  position:fixed;z-index:60;pointer-events:none;
  border-radius:12px;
  box-shadow:0 0 0 4000px rgba(0,0,0,.75),0 0 60px rgba(25,183,239,.4);
  opacity:0;transition:opacity .5s,left .8s cubic-bezier(.25,.46,.45,.94),top .8s cubic-bezier(.25,.46,.45,.94),width .8s,height .8s;
}

/* ── WORD SLAM ── */
#wordslam{
  position:fixed;inset:0;z-index:300;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
}
#wordslam .ws-text{
  font-size:120px;font-weight:900;letter-spacing:-4px;
  text-transform:uppercase;line-height:1;text-align:center;
  filter:drop-shadow(0 0 40px currentColor);
}

/* ── SCREEN LABEL ── */
#screenlabel{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  z-index:200;pointer-events:none;
  background:rgba(2,6,14,.85);border:1px solid rgba(25,183,239,.2);
  border-radius:20px;padding:8px 20px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
  color:var(--blue);letter-spacing:.14em;text-transform:uppercase;
  opacity:0;transition:opacity .4s;
}

/* ── PROGRESS BAR ── */
#progress{
  position:fixed;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--blue),var(--green));
  z-index:400;transition:width .1s linear;width:0%;
}

/* ── PLAY BUTTON ── */
#playBtn{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(25,183,239,.08),transparent 70%),#000;
  cursor:pointer;
}
#playBtn .wm{font-size:56px;font-weight:900;letter-spacing:-2px;margin-bottom:16px;}
#playBtn .wm .t{color:#fff;} #playBtn .wm .p{color:var(--blue);}
#playBtn .tagline{font-family:'DM Mono',monospace;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:48px;}
#playBtn .play-circle{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#0060cc);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;
  box-shadow:0 0 60px rgba(25,183,239,.4);
  animation:pulse 2s ease-in-out infinite;
}
#playBtn .play-hint{margin-top:20px;font-size:13px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;letter-spacing:.1em;}

/* ── VOICE INDICATOR ── */
#voiceIndicator{
  position:fixed;bottom:80px;right:32px;z-index:200;
  display:flex;align-items:center;gap:10px;
  background:rgba(7,24,40,.9);border:1px solid rgba(255,59,48,.3);
  border-radius:20px;padding:10px 18px;
  opacity:0;transition:opacity .4s;
}
#voiceIndicator .vi-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink .6s infinite;}
#voiceIndicator .vi-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);letter-spacing:.08em;}

@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes slamIn{0%{opacity:0;transform:scale(3);}60%{opacity:1;transform:scale(0.95);}100%{opacity:1;transform:scale(1);}}
@keyframes slamOut{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0.6);}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="stage">
  <div id="viewport">
    <iframe id="frame" src="about:blank" scrolling="no"></iframe>
  </div>
  <div id="lens"></div>
  <div id="spotlight"></div>
  <div id="wordslam"><div class="ws-text" id="wsText"></div></div>
  <div id="screenlabel" id="screenlabel"></div>
  <div id="caption"><div class="cap-label" id="capLabel"></div><div class="cap-text" id="capText"></div></div>
  <div id="voiceIndicator"><div class="vi-dot"></div><div class="vi-text">Ruby speaking</div></div>
  <div id="progress"></div>
</div>

<div id="playBtn" onclick="startDemo()">
  <div class="wm"><span class="t">TACK</span><span class="p">PATH</span></div>
  <div class="tagline">Delivery that thinks ahead. Automatically.</div>
  <div class="play-circle">&#9654;</div>
  <div class="play-hint">Tap to watch the demo</div>
</div>

<script>
const frame = document.getElementById('frame');
const viewport = document.getElementById('viewport');
const spotlight = document.getElementById('spotlight');
const wordslam = document.getElementById('wordslam');
const wsText = document.getElementById('wsText');
const screenlabel = document.getElementById('screenlabel');
const caption = document.getElementById('caption');
const capLabel = document.getElementById('capLabel');
const capText = document.getElementById('capText');
const voiceIndicator = document.getElementById('voiceIndicator');
const progress = document.getElementById('progress');

let totalDuration = 0;
let startTime = 0;
let progressInt = null;

// ── SCALE VIEWPORT TO WINDOW ──
function scaleViewport(){
  const scaleX = window.innerWidth / 1440;
  const scaleY = window.innerHeight / 900;
  const scale = Math.min(scaleX, scaleY) * 0.92;
  document.documentElement.style.setProperty('--vscale', scale);
}
scaleViewport();
window.addEventListener('resize', scaleViewport);

// ── HELPERS ──
function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

function setViewportTransform(tx, ty, scale, duration=1200){
  viewport.style.transition = `transform ${duration}ms cubic-bezier(.25,.46,.45,.94)`;
  const base = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--vscale'));
  viewport.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${base * scale})`;
}

function resetViewport(duration=800){
  viewport.style.transition = `transform ${duration}ms cubic-bezier(.25,.46,.45,.94)`;
  const base = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--vscale'));
  viewport.style.transform = `translate(-50%, -50%) scale(${base})`;
}

function showLabel(text){
  screenlabel.textContent = text;
  screenlabel.style.opacity = '1';
}
function hideLabel(){ screenlabel.style.opacity = '0'; }

function showCaption(label, text){
  capLabel.textContent = label;
  capText.textContent = text;
  caption.style.opacity = '1';
}
function hideCaption(){ caption.style.opacity = '0'; }

// Spotlight on a region of the 1440x900 iframe
function spotlightOn(x, y, w, h){
  const scale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--vscale'));
  const vw = window.innerWidth, vh = window.innerHeight;
  const vx = (vw - 1440 * scale) / 2;
  const vy = (vh - 900 * scale) / 2;
  spotlight.style.left = (vx + x * scale) + 'px';
  spotlight.style.top = (vy + y * scale) + 'px';
  spotlight.style.width = (w * scale) + 'px';
  spotlight.style.height = (h * scale) + 'px';
  spotlight.style.opacity = '1';
}
function spotlightOff(){ spotlight.style.opacity = '0'; }

function slamWord(text, color='#fff', duration=1800){
  return new Promise(async r => {
    wsText.textContent = text;
    wsText.style.color = color;
    wordslam.style.opacity = '1';
    wsText.style.animation = 'none';
    wsText.offsetHeight;
    wsText.style.animation = 'slamIn .5s cubic-bezier(.17,.67,.38,1.28) forwards';
    await wait(duration - 400);
    wsText.style.animation = 'slamOut .4s ease forwards';
    await wait(400);
    wordslam.style.opacity = '0';
    r();
  });
}

function speak(text){
  return new Promise(r => {
    try{
      voiceIndicator.style.opacity = '1';
      const synth = window.speechSynthesis;
      synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const voices = synth.getVoices();
      const voice = voices.find(v=>v.lang==='en-US'&&!v.name.toLowerCase().includes('compact'))
        || voices.find(v=>v.lang.startsWith('en-')) || null;
      if(voice) u.voice = voice;
      u.rate = 0.95; u.pitch = 1.05; u.volume = 1;
      u.onend = ()=>{ voiceIndicator.style.opacity='0'; r(); };
      u.onerror = ()=>{ voiceIndicator.style.opacity='0'; r(); };
      synth.speak(u);
    }catch(e){ voiceIndicator.style.opacity='0'; r(); }
  });
}

function beep(freq=880, dur=0.3){
  try{
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur + 0.1);
  }catch(e){}
}

function loadPage(url){ frame.src = url; return wait(2000); }

function updateProgress(){
  const elapsed = Date.now() - startTime;
  const pct = Math.min(elapsed / totalDuration * 100, 100);
  progress.style.width = pct + '%';
}

// ── DEMO SEQUENCE ──
async function startDemo(){
  document.getElementById('playBtn').style.display = 'none';
  window.speechSynthesis.cancel();
  // Unlock audio
  try{ const u=new SpeechSynthesisUtterance(' ');u.volume=0;window.speechSynthesis.speak(u); }catch(e){}

  totalDuration = 120000; // 2 minutes
  startTime = Date.now();
  progressInt = setInterval(updateProgress, 100);

  // ── SCENE 1: Customer places order ──
  await loadPage('https://tackpath.com/customer.html');
  showLabel('Customer Portal');
  showCaption('Scene 1', 'Customer places a delivery order');
  await wait(1500);

  // Zoom into the order form
  setViewportTransform(0, 0, 1.4, 1000);
  await wait(1200);
  spotlightOn(480, 180, 480, 440);
  showCaption('Customer', 'Filling out delivery details...');
  await wait(2500);

  spotlightOff();
  resetViewport();
  await wait(800);
  spotlightOn(520, 580, 400, 60);
  showCaption('Customer', 'Order submitted');
  beep(660, 0.2); await wait(300); beep(880, 0.15);
  await wait(1500);
  spotlightOff();

  // ── SCENE 2: SmartPath builds route ──
  await slamWord('SMARTPATH', 'var(--blue)');
  await loadPage('https://tackpath.com/dispatcher.html');
  showLabel('Dispatcher — SmartPath');
  showCaption('SmartPath', 'Mapping optimal route...');
  await wait(1000);

  // Zoom into Surge tab
  setViewportTransform(200, -50, 1.6, 1000);
  await wait(1200);
  spotlightOn(300, 60, 220, 52);
  showCaption('SmartPath', 'Route intelligence activated');
  await wait(2000);

  spotlightOff();
  // Zoom into the map
  setViewportTransform(150, 0, 1.8, 1000);
  await wait(1000);
  spotlightOn(340, 140, 720, 480);
  showCaption('SmartPath', 'Optimizing 8 stops across Atlanta Metro');
  await wait(2500);
  spotlightOff();
  resetViewport();

  // ── SCENE 3: Finding driver ──
  await slamWord('FINDING DRIVER', 'var(--green)');
  showLabel('SmartTrack — Live Fleet');
  showCaption('SmartTrack', 'Locating nearest available driver');
  setViewportTransform(-100, 0, 1.5, 1000);
  await wait(1200);
  // Spotlight on map with driver pins
  spotlightOn(200, 120, 800, 520);
  await wait(2000);
  spotlightOff();
  resetViewport();

  // ── SCENE 4: Driver accepts ──
  await slamWord('DRIVER FOUND', 'var(--green)');
  await loadPage('https://tackpath.com/driver.html');
  showLabel('Driver App');
  showCaption('Driver', 'New job offer incoming...');
  await wait(1500);

  beep(660, 0.18); await wait(280); beep(880, 0.18); await wait(280); beep(660, 0.18);
  // Zoom into offer screen
  setViewportTransform(0, 0, 1.5, 800);
  await wait(1000);
  spotlightOn(0, 0, 1440, 900);
  showCaption('Driver', '$47 · 3.2 miles · Atlanta pickup');
  await wait(2000);

  spotlightOff();
  // Zoom into accept button
  setViewportTransform(0, 200, 2.2, 800);
  spotlightOn(820, 780, 440, 80);
  showCaption('Driver', 'Driver accepts the job');
  beep(880, 0.12); await wait(200); beep(1100, 0.2);
  await wait(1800);
  spotlightOff();
  resetViewport();

  // ── SCENE 5: Driver navigates to pickup ──
  showCaption('Driver', 'Navigating to pickup location');
  setViewportTransform(0, -80, 1.4, 800);
  await wait(1200);
  spotlightOn(60, 120, 1320, 480);
  showCaption('Driver', 'Live map — en route to pickup');
  await wait(2500);
  spotlightOff();
  resetViewport();

  // ── SCENE 6: SmartTrack shows driver moving ──
  await slamWord('IN TRANSIT', 'var(--purple)');
  await loadPage('https://tackpath.com/dispatcher.html');
  showLabel('Dispatcher — SmartTrack');
  showCaption('SmartTrack', 'Driver pin moving in real time');
  setViewportTransform(100, 0, 1.6, 800);
  await wait(1200);
  spotlightOn(280, 130, 780, 500);
  await wait(2500);
  spotlightOff();
  resetViewport();

  // Zoom into a job card status
  setViewportTransform(-350, 0, 1.8, 900);
  await wait(1000);
  spotlightOn(20, 200, 380, 120);
  showCaption('Dispatcher', 'Job status: In Transit');
  await wait(2000);
  spotlightOff();
  resetViewport();

  // ── SCENE 7: Customer sees live tracking ──
  await slamWord('DELIVERY LIVE', 'var(--green)');
  await loadPage('https://tackpath.com/customer.html');
  showLabel('Customer Portal');
  showCaption('Customer', 'Your delivery is live');
  setViewportTransform(0, 0, 1.4, 800);
  await wait(1000);
  spotlightOn(380, 300, 680, 200);
  await wait(2000);
  spotlightOff();
  resetViewport();

  // ── SCENE 8: Driver taps Ruby ──
  await slamWord('RUBY', 'var(--red)');
  await loadPage('https://tackpath.com/driver.html');
  showLabel('Driver App — Ruby Voice AI');
  showCaption('Ruby', 'Driver activates voice command');
  setViewportTransform(0, 150, 2.0, 800);
  await wait(1000);
  // Spotlight Ruby button area
  spotlightOn(620, 700, 200, 120);
  await wait(1200);
  spotlightOff();

  // Ruby speaks
  await speak("Package collected. Heading to dropoff now. ETA 12 minutes.");

  // ── SCENE 9: Dispatcher gets Ruby message ──
  await loadPage('https://tackpath.com/dispatcher.html');
  showLabel('Dispatcher — Comms');
  showCaption('Dispatcher', 'Ruby message received from driver');
  setViewportTransform(-350, 0, 1.6, 800);
  await wait(1000);
  spotlightOn(20, 320, 380, 340);
  await wait(2000);
  spotlightOff();
  resetViewport();

  // Dispatcher responds
  showCaption('Dispatcher', 'Dispatcher responds via Symphony+');
  setViewportTransform(-350, 0, 1.8, 800);
  await wait(800);
  spotlightOn(20, 560, 380, 80);
  await wait(1500);
  spotlightOff();
  resetViewport();

  // ── SCENE 10: Ruby reads dispatcher reply ──
  await loadPage('https://tackpath.com/driver.html');
  showLabel('Driver App — Dispatch Message');
  showCaption('Ruby', 'Dispatch message — Ruby reads it aloud');
  beep(880, 0.12); await wait(200); beep(1100, 0.15);
  setViewportTransform(0, -100, 1.5, 800);
  await wait(1000);
  spotlightOn(60, 60, 1320, 120);
  await wait(800);
  spotlightOff();
  await speak("Dispatch says: Great work. Customer is waiting at the door. Suite 4B.");
  resetViewport();

  // ── SCENE 11: Delivery confirmed ──
  await slamWord('DELIVERED', 'var(--green)');
  showLabel('Driver App — Proof of Delivery');
  showCaption('Driver', 'Confirming delivery — POD submitted');
  setViewportTransform(0, 0, 1.4, 800);
  await wait(1000);
  spotlightOn(280, 680, 880, 120);
  beep(660, 0.15); await wait(200); beep(880, 0.15); await wait(200); beep(1100, 0.2);
  await wait(2000);
  spotlightOff();
  resetViewport();

  // ── SCENE 12: Customer confirmation ──
  await loadPage('https://tackpath.com/customer.html');
  showLabel('Customer Portal');
  showCaption('Customer', 'Delivery confirmed ✓');
  setViewportTransform(0, 0, 1.5, 800);
  await wait(1000);
  spotlightOn(380, 300, 680, 160);
  await wait(2000);
  spotlightOff();
  resetViewport();

  // ── SCENE 13: Dispatcher — job complete ──
  await loadPage('https://tackpath.com/dispatcher.html');
  showLabel('Dispatcher — Job Complete');
  showCaption('TackPath', 'End-to-end. Automated. Intelligent.');
  setViewportTransform(-350, 0, 1.6, 800);
  await wait(1000);
  spotlightOn(20, 200, 380, 120);
  await wait(2000);
  spotlightOff();
  resetViewport();

  // ── FINALE ──
  hideCaption();
  hideLabel();
  await wait(600);

  // Load blank and show finale
  frame.src = 'about:blank';
  await wait(500);

  // Slam the final message
  await slamWord('TACKPATH', 'var(--blue)', 1200);
  await slamWord('DELIVERY THAT THINKS AHEAD', '#fff', 2000);
  await slamWord('AUTOMATICALLY', 'var(--green)', 2000);

  // End card
  document.getElementById('stage').innerHTML = `
    <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(25,183,239,.08),transparent 70%),#000;gap:16px;">
      <div style="font-size:64px;font-weight:900;letter-spacing:-3px;animation:slideUp .6s ease;"><span style="color:#fff;">TACK</span><span style="color:var(--blue);">PATH</span></div>
      <div style="font-family:'DM Mono',monospace;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.2em;text-transform:uppercase;animation:slideUp .6s .2s ease both;">Delivery that thinks ahead. Automatically.</div>
      <div style="display:flex;gap:24px;margin-top:32px;animation:slideUp .6s .4s ease both;">
        <a href="https://tackpath.com" style="padding:14px 28px;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:800;text-decoration:none;">Learn More</a>
        <a href="https://tackpath.com/dispatcher.html" style="padding:14px 28px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:15px;font-weight:700;text-decoration:none;">See the Platform</a>
      </div>
    </div>`;

  clearInterval(progressInt);
  progress.style.width = '100%';
}
</script>
</body>
</html>
