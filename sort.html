<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#19b7ef;--green:#53ff88;--orange:#ff961e;--red:#ff4444;
  --bg:#010e21;--card:#071828;--card2:#0d2135;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.12);--text:#eef4ff;--muted:rgba(238,244,255,.65);
  --mono:'DM Mono',monospace;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

.topbar{height:56px;background:rgba(1,14,33,.98);border-bottom:1px solid rgba(25,183,239,.1);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  position:sticky;top:0;z-index:10;}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 9px;
  border-radius:6px;background:rgba(25,183,239,.1);border:1px solid rgba(25,183,239,.25);
  color:var(--blue);letter-spacing:.1em;text-transform:uppercase;}

.main{max-width:680px;margin:0 auto;padding:20px 16px 60px;}

.warehouse-wrap{background:var(--card);border:1px solid var(--border2);border-radius:14px;
  padding:18px;margin-bottom:14px;}
.field-lbl{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--blue);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:block;}
.field-in{width:100%;padding:14px 16px;border-radius:11px;background:var(--card2);
  border:1px solid var(--border2);color:#fff;font-size:16px;font-weight:600;
  font-family:'DM Sans',sans-serif;outline:none;}
.field-in:focus{border-color:rgba(25,183,239,.4);}
.field-in::placeholder{color:rgba(238,244,255,.3);font-weight:400;}

.upload-zone{background:var(--card);border:2px dashed rgba(25,183,239,.2);
  border-radius:16px;padding:36px 20px;text-align:center;margin-bottom:14px;cursor:pointer;transition:all .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:rgba(25,183,239,.04);}
.upload-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.upload-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.upload-btn{display:inline-block;padding:14px 32px;border-radius:11px;background:var(--blue);
  color:#fff;font-size:15px;font-weight:800;cursor:pointer;}
.upload-or{font-size:12px;color:var(--muted);margin:12px 0;}
.demo-btn{padding:12px 24px;border-radius:11px;background:transparent;
  border:1px solid var(--border2);color:rgba(238,244,255,.8);font-size:14px;
  font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}

.file-attached{display:none;align-items:center;gap:12px;background:rgba(83,255,136,.06);
  border:1px solid rgba(83,255,136,.2);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.file-attached.on{display:flex;}
.file-name{font-size:14px;font-weight:700;color:#fff;flex:1;}
.file-count{font-family:var(--mono);font-size:11px;color:var(--green);}
.file-remove{color:var(--muted);cursor:pointer;font-size:20px;padding:2px 6px;}

.progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px;margin-bottom:14px;display:none;}
.progress-title{font-size:17px;font-weight:800;margin-bottom:6px;}
.progress-sub{font-size:14px;color:rgba(238,244,255,.85);margin-bottom:14px;font-weight:600;}
.progress-bar-bg{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),#5dd4f4);
  border-radius:3px;transition:width .3s;}
.progress-addr{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;}

.results-wrap{display:none;}
.results-hdr{display:flex;align-items:flex-start;justify-content:space-between;

.results-title{font-size:24px;font-weight:800;}
.results-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;}
.results-actions{display:flex;gap:8px;flex-shrink:0;}
.action-btn{padding:11px 18px;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
.ab-print{background:rgba(83,255,136,.1);border:1px solid rgba(83,255,136,.2)!important;color:var(--green);border:none;}
.ab-scan{background:var(--blue);color:#fff;}
.ab-reset{background:rgba(255,255,255,.06);border:1px solid var(--border)!important;color:var(--muted);border:none;}

.route-ready{display:none;background:rgba(83,255,136,.08);border:2px solid rgba(83,255,136,.3);

.route-ready.on{display:block;}
.rr-title{font-size:20px;font-weight:800;color:var(--green);margin-bottom:4px;}
.rr-sub{font-size:13px;color:rgba(238,244,255,.7);}

.map-btn{width:100%;padding:13px;border-radius:11px;background:rgba(25,183,239,.08);

  cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:12px;display:none;}
.map-btn.on{display:block;}
.map-wrap{display:none;border-radius:14px;overflow:hidden;margin-bottom:14px;

.map-wrap.on{display:block;}
#routeMap{width:100%;height:360px;}

.stop-card{background:var(--card);border:1px solid var(--border);border-radius:13px;

.stop-card.confirmed{border-color:rgba(83,255,136,.25);background:rgba(83,255,136,.03);}
.stop-num{width:52px;height:52px;border-radius:12px;background:var(--blue);
  color:#fff;font-family:var(--mono);font-size:22px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stop-card.confirmed .stop-num{background:var(--green);color:#010e21;}
.stop-info{flex:1;min-width:0;}
.stop-name{font-size:17px;font-weight:800;margin-bottom:3px;}
.stop-address{font-size:14px;color:rgba(238,244,255,.85);line-height:1.5;font-weight:500;}
.stop-id{font-family:var(--mono);font-size:10px;color:rgba(238,244,255,.35);margin-top:3px;}
.stop-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.stop-pkgs{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue);}
.stop-pkgs-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;}
.confirm-btn{padding:9px 14px;border-radius:9px;background:rgba(25,183,239,.08);
  border:1px solid rgba(25,183,239,.2);color:var(--blue);font-size:12px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.confirm-btn.confirmed{background:rgba(83,255,136,.1);border-color:rgba(83,255,136,.3);
  color:var(--green);cursor:default;}

.total-bar{background:rgba(25,183,239,.06);border:1px solid rgba(25,183,239,.15);
  border-radius:12px;padding:14px 18px;display:flex;gap:28px;margin-top:14px;flex-wrap:wrap;}
.tb-stat{text-align:center;}
.tb-num{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--blue);}
.tb-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin-top:3px;}

/* SCANNER */
.scan-overlay{position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(1,14,33,.97);z-index:99999;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.scan-overlay.on{display:flex;}
.scan-close{position:absolute;top:20px;right:20px;background:none;border:none;
  color:rgba(238,244,255,.5);font-size:32px;cursor:pointer;padding:8px;}
.scan-label{font-family:var(--mono);font-size:11px;color:var(--blue);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:16px;}
.scan-video-wrap{width:100%;max-width:380px;border-radius:18px;overflow:hidden;
  border:3px solid var(--blue);position:relative;margin-bottom:20px;}
.scan-video{width:100%;display:block;background:#000;}
.scan-line{position:absolute;left:10%;right:10%;height:2px;background:var(--blue);
  opacity:.9;animation:scanline 2s ease-in-out infinite;}
@keyframes scanline{0%,100%{top:20%;}50%{top:78%;}}
.scan-status{font-family:var(--mono);font-size:12px;color:var(--muted);
  text-align:center;letter-spacing:.06em;padding:0 20px;}

.scan-flash{position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(1,14,33,.97);z-index:999999;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;}
.scan-flash.on{display:flex;}
.flash-num{font-family:var(--mono);font-size:110px;font-weight:700;
  color:var(--green);line-height:1;margin-bottom:6px;}
.flash-lbl{font-family:var(--mono);font-size:12px;color:var(--green);
  letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;}
.flash-name{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;}
.flash-addr{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5;}
.flash-next{padding:16px 40px;border-radius:12px;background:var(--blue);
  border:none;color:#fff;font-size:16px;font-weight:800;cursor:pointer;
  font-family:'DM Sans',sans-serif;}

#toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);
  background:rgba(7,24,40,.97);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;
  z-index:9999;display:none;white-space:nowrap;}

@media(max-width:480px){
  .stop-card{flex-wrap:wrap;}
  .stop-right{flex-direction:row;flex:100%;justify-content:space-between;
    margin-top:8px;padding-top:10px;border-top:1px solid var(--border);}
  .results-hdr{flex-direction:column;}
  .results-actions{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .action-btn{text-align:center;padding:11px 8px;font-size:13px;}
}

@media print{
  .topbar,.warehouse-wrap,.upload-zone,.file-attached,.progress-wrap,
  .results-actions,.map-btn,.map-wrap,.confirm-btn,.total-bar,#toast,
  .scan-overlay,.scan-flash{display:none!important;}
  body{background:#fff;color:#000;}
  .stop-card{background:#fff;border:1px solid #ddd;break-inside:avoid;margin-bottom:8px;}
  .stop-num{background:#19b7ef;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .stop-name{color:#000;}
  .stop-address{color:#333;}
  .stop-pkgs{color:#19b7ef;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}

<script>
const GMAPS_KEY = 'AIzaSyCZOSWrBATtsPI9KX76ZLzjMeDSNszCZk8';

// Load Google Maps dynamically
function loadGoogleMaps(){
  return new Promise((resolve)=>{
    if(window.google && window.google.maps){resolve();return;}
    const s = document.createElement('script');
    s.src = 'https://maps.googleapis.com/maps/api/js?key='+GMAPS_KEY;
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

const DEMO = [
  {order_id:'TP78001',recipient:'Marcus Johnson',address:'142 Peachtree St NW Atlanta GA 30303',packages:2},
  {order_id:'TP78002',recipient:'Sarah Williams',address:'890 Marietta St NW Atlanta GA 30318',packages:1},
  {order_id:'TP78003',recipient:'David Chen',address:'1180 Peachtree St NE Atlanta GA 30309',packages:3},
  {order_id:'TP78004',recipient:'Jennifer Davis',address:'75 5th St NW Atlanta GA 30308',packages:1},
  {order_id:'TP78005',recipient:'Robert Miller',address:'400 W Peachtree St NW Atlanta GA 30308',packages:2},
  {order_id:'TP78006',recipient:'Angela Thompson',address:'3393 Peachtree Rd NE Atlanta GA 30326',packages:4},
  {order_id:'TP78007',recipient:'Kevin Harris',address:'2500 Cumberland Pkwy SE Atlanta GA 30339',packages:1},
  {order_id:'TP78008',recipient:'Patricia Moore',address:'1544 Piedmont Ave NE Atlanta GA 30324',packages:2},
  {order_id:'TP78009',recipient:'James Wilson',address:'640 W Peachtree St NW Atlanta GA 30308',packages:1},
  {order_id:'TP78010',recipient:'Linda Anderson',address:'220 Interstate N Pkwy SE Atlanta GA 30339',packages:3},
  {order_id:'TP78011',recipient:'Michael Brown',address:'3630 Peachtree Rd NE Atlanta GA 30319',packages:2},
  {order_id:'TP78012',recipient:'Barbara Jackson',address:'1000 Northside Dr NW Atlanta GA 30318',packages:1},
  {order_id:'TP78013',recipient:'Christopher White',address:'2550 Sandy Plains Rd Marietta GA 30066',packages:2},
  {order_id:'TP78014',recipient:'Susan Taylor',address:'4300 Paces Ferry Rd SE Atlanta GA 30339',packages:1},
  {order_id:'TP78015',recipient:'Matthew Martinez',address:'1100 Spring St NW Atlanta GA 30309',packages:3},
];

let packages = [];
let sortedStops = [];
let warehouseGeo = null;
let confirmedStops = [];
let mapShowing = false;
let mapBuilt = false;
let scanStream = null;
let scanInterval = null;
let barcodeDetector = null;

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.style.display='none', 3000);
}

function handleFile(file){
  if(!file || !file.name.endsWith('.csv')){toast('Please upload a CSV file');return;}
  const reader = new FileReader();
  reader.onload = e => {
    parseCSV(e.target.result);
    document.getElementById('fileName').textContent = file.name;
  };
  reader.readAsText(file);
}

function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2){toast('CSV needs a header row and at least one stop');return;}
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const idx = {
    order_id: headers.indexOf('order_id'),
    recipient: headers.indexOf('recipient'),
    address: headers.indexOf('address'),
    packages: headers.indexOf('packages')
  };
  if(idx.address < 0){toast('Missing required column: address');return;}
  packages = [];
  for(let i=1;i<lines.length;i++){
    const c = lines[i].split(',').map(v=>v.trim().replace(/"/g,''));
    if(!c[idx.address]) continue;
    packages.push({
      order_id: c[idx.order_id] || ('TP'+String(i).padStart(5,'0')),
      recipient: c[idx.recipient] || 'Stop '+i,
      address: c[idx.address],
      packages: parseInt(c[idx.packages]) || 1
    });
  }
  if(!packages.length){toast('No valid stops found in CSV');return;}
  document.getElementById('fileCount').textContent = packages.length+' stops ready';
  document.getElementById('fileAttached').classList.add('on');
  startGeocoding();
}

function loadDemo(){
  packages = [...DEMO];
  document.getElementById('fileName').textContent = 'demo-manifest.csv';
  document.getElementById('fileCount').textContent = packages.length+' stops ready';
  document.getElementById('fileAttached').classList.add('on');
  startGeocoding();
}

function clearFile(){
  packages = [];
  document.getElementById('fileAttached').classList.remove('on');
  document.getElementById('fileInput').value = '';
}

async function startGeocoding(){
  const addr = document.getElementById('warehouseAddr').value.trim();
  if(!addr){toast('Please enter the dispatch address first');return;}

  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressSub').textContent = 'Geocoding '+packages.length+' addresses...';
  document.getElementById('progressFill').style.width = '10%';
  document.getElementById('progressAddr').textContent = 'Processing all addresses simultaneously...';

  // Geocode warehouse
  const wGeo = await geocode(addr);
  if(wGeo) warehouseGeo = wGeo;
  document.getElementById('progressFill').style.width = '20%';

  // Geocode all stops in parallel
  const results = await Promise.all(packages.map(p =>
    geocode(p.address).then(geo => ({...p, lat: geo ? geo.lat : null, lng: geo ? geo.lng : null}))
  ));

  document.getElementById('progressFill').style.width = '80%';
  document.getElementById('progressSub').textContent = 'Sequencing optimal delivery order...';

  const withCoords = results.filter(p => p.lat !== null);
  const without = results.filter(p => p.lat === null);

  sortedStops = [...nearestNeighbor(withCoords, warehouseGeo), ...without];

  document.getElementById('progressFill').style.width = '100%';
  setTimeout(()=> renderResults(sortedStops), 200);
}

async function geocode(address){
  try{
    const url = 'https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(address)+'&key='+GMAPS_KEY;
    const r = await fetch(url);
    const data = await r.json();
    if(data.status === 'OK' && data.results.length){
      return {lat: data.results[0].geometry.location.lat, lng: data.results[0].geometry.location.lng};
    }
  }catch(e){}
  return null;
}

function nearestNeighbor(stops, start){
  if(!stops.length) return [];
  const unvisited = [...stops];
  const route = [];
  let current = start || unvisited[0];
  if(!start) route.push(unvisited.shift());

  while(unvisited.length){
    let nearest = null, minDist = Infinity, nearestIdx = 0;
    unvisited.forEach((s,i)=>{
      const d = haversine(current.lat, current.lng, s.lat, s.lng);
      if(d < minDist){minDist=d; nearest=s; nearestIdx=i;}
    });
    route.push(nearest);
    unvisited.splice(nearestIdx,1);
    current = nearest;
  }
  return route;
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function renderResults(stops){
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('resultsWrap').style.display = 'block';
  confirmedStops = new Array(stops.length).fill(false);

  const totalPkgs = stops.reduce((s,p)=>s+p.packages,0);
  document.getElementById('resultsMeta').textContent = stops.length+' stops · '+totalPkgs+' total packages';
  document.getElementById('mapBtn').classList.add('on');

  document.getElementById('stopsList').innerHTML = stops.map((s,i)=>`
    <div class="stop-card" id="sc-${i}">
      <div class="stop-num" id="sn-${i}">${i+1}</div>
      <div class="stop-info">
        <div class="stop-name">${s.recipient}</div>
        <div class="stop-address">${s.address}</div>
        <div class="stop-id">${s.order_id}</div>
      </div>
      <div class="stop-right">
        <div><div class="stop-pkgs">${s.packages}</div><div class="stop-pkgs-lbl">pkg${s.packages!==1?'s':''}</div></div>
        <button class="confirm-btn" id="cb-${i}" onclick="confirmStop(${i})">Confirm</button>
      </div>
    </div>`).join('');

  document.getElementById('totalBar').innerHTML = `
    <div class="tb-stat"><div class="tb-num">${stops.length}</div><div class="tb-lbl">Stops</div></div>
    <div class="tb-stat"><div class="tb-num">${totalPkgs}</div><div class="tb-lbl">Packages</div></div>
    <div class="tb-stat"><div class="tb-num" id="stagedCount">0</div><div class="tb-lbl">Staged</div></div>`;
}

function confirmStop(i){
  confirmedStops[i] = true;
  document.getElementById('sc-'+i).classList.add('confirmed');
  const btn = document.getElementById('cb-'+i);
  btn.textContent = '\u2713 Staged';
  btn.classList.add('confirmed');
  btn.disabled = true;
  const done = confirmedStops.filter(Boolean).length;
  document.getElementById('stagedCount').textContent = done;
  document.getElementById('resultsMeta').textContent = done+' of '+confirmedStops.length+' stops staged';
  if(done === confirmedStops.length){
    document.getElementById('routeReady').classList.add('on');
    document.getElementById('routeReady').scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function toggleMap(){
  const btn = document.getElementById('mapBtn');
  const wrap = document.getElementById('mapWrap');
  mapShowing = !mapShowing;
  wrap.classList.toggle('on', mapShowing);
  btn.textContent = mapShowing ? 'Hide Map' : 'Show Map';
  if(mapShowing && !mapBuilt) buildMap();
}

async function buildMap(){
  await loadGoogleMaps();
  mapBuilt = true;
  const validStops = sortedStops.filter(s=>s.lat !== null);
  if(!validStops.length) return;
  const center = {lat: validStops[0].lat, lng: validStops[0].lng};
  const map = new google.maps.Map(document.getElementById('routeMap'), {
    zoom: 11, center, mapTypeId: 'roadmap', styles: []
  });
  if(warehouseGeo){
    new google.maps.Marker({position:{lat:warehouseGeo.lat,lng:warehouseGeo.lng},map,title:'Start'});
  }
  validStops.forEach((s,i)=>{
    new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng}, map,
      label:{text:String(i+1),color:'#fff',fontWeight:'800',fontSize:'11px'},
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:'#19b7ef',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
      title:'Stop '+(i+1)+': '+s.recipient
    });
  });
  new google.maps.Polyline({
    path:validStops.map(s=>({lat:s.lat,lng:s.lng})),
    geodesic:true,strokeColor:'#19b7ef',strokeOpacity:.5,strokeWeight:2,map
  });
}

function resetAll(){
  packages=[];sortedStops=[];warehouseGeo=null;confirmedStops=[];mapShowing=false;mapBuilt=false;
  document.getElementById('uploadZone').style.display='block';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('resultsWrap').style.display='none';
  document.getElementById('fileAttached').classList.remove('on');
  document.getElementById('fileInput').value='';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('warehouseAddr').value='';
  document.getElementById('mapWrap').classList.remove('on');
  document.getElementById('mapBtn').classList.remove('on');
  document.getElementById('routeReady').classList.remove('on');
}

// SCANNER
async function openScanner(){
  document.getElementById('scanOverlay').style.display='flex';
  document.getElementById('scanStatus').textContent='Requesting camera access...';
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById('scanStatus').textContent='Camera not supported. Use Chrome on Android.';
    return;
  }
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
    const video = document.getElementById('scanVideo');
    video.srcObject = scanStream;
    await video.play();
    document.getElementById('scanStatus').textContent='Point camera at barcode';
    if('BarcodeDetector' in window){
      barcodeDetector = new BarcodeDetector({formats:['code_128','code_39','ean_13','ean_8','qr_code','upc_a','upc_e']});
      scanInterval = setInterval(async()=>{
        try{
          const codes = await barcodeDetector.detect(video);
          if(codes.length) handleScan(codes[0].rawValue);
        }catch(e){}
      },250);
    } else {
      document.getElementById('scanStatus').textContent='Camera open but barcode detection requires Chrome on Android';
    }
  }catch(e){
    if(e.name==='NotAllowedError') document.getElementById('scanStatus').textContent='Camera permission denied. Please allow camera access.';
    else document.getElementById('scanStatus').textContent='Camera error: '+e.message;
  }
}

function handleScan(barcode){
  clearInterval(scanInterval);
  const idx = sortedStops.findIndex(s=>s.order_id===barcode||s.order_id.includes(barcode)||barcode.includes(s.order_id));

  if(idx===-1){
    document.getElementById('scanStatus').textContent='Not found: '+barcode;
    setTimeout(resumeScanning, 1500);
    return;
  }

  // Already staged
  if(confirmedStops[idx]){
    document.getElementById('scanStatus').textContent='Already Staged -- Stop '+(idx+1)+': '+sortedStops[idx].recipient;
    setTimeout(resumeScanning, 2000);
    return;
  }

  const stop = sortedStops[idx];
  document.getElementById('scanOverlay').style.display='none';
  document.getElementById('flashNum').textContent=idx+1;
  document.getElementById('flashName').textContent=stop.recipient;
  document.getElementById('flashAddr').textContent=stop.address;
  document.getElementById('scanFlash').style.display='flex';
  confirmStop(idx);
  beep();
}

function resumeScanning(){
  document.getElementById('scanStatus').textContent='Point camera at barcode';
  if(barcodeDetector){
    const video=document.getElementById('scanVideo');
    scanInterval=setInterval(async()=>{
      try{const c=await barcodeDetector.detect(video);if(c.length)handleScan(c[0].rawValue);}catch(e){}
    },250);
  }
}

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;osc.type='sine';
    gain.gain.setValueAtTime(.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.15);
  }catch(e){}
}

function continueScan(){
  document.getElementById('scanFlash').style.display='none';
  document.getElementById('scanOverlay').style.display='flex';
  document.getElementById('scanStatus').textContent='Point camera at next barcode';
  resumeScanning();
}

function closeScanner(){
  clearInterval(scanInterval);
  if(scanStream) scanStream.getTracks().forEach(t=>t.stop());
  document.getElementById('scanOverlay').style.display='none';
  document.getElementById('scanFlash').style.display='none';
  scanStream=null;barcodeDetector=null;
}
</script>
