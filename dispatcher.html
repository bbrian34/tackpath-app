<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TackPath — Command Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=family=Montserrat:wght@500&IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;600;700;800;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#19b7ef;--green:#53ff88;--orange:#ff961e;--red:#ff3b30;
  --purple:#8d5cff;--yellow:#ffd23d;
  --bg:#02060e;--card:#07101e;--card2:#0b1728;--card3:#0f1e32;
  --border:rgba(25,183,239,.07);--border2:rgba(255,255,255,.04);
  --text:#d8eeff;--muted:rgba(216,238,255,.38);--faint:rgba(216,238,255,.15);
  --mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;--cond:'Barlow Condensed',sans-serif;
}
html,body{height:100%;margin:0;padding:0;}
body{font-family:var(--sans);color:var(--text);background:var(--bg);font-size:13px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:
    linear-gradient(rgba(25,183,239,.014) 1px,transparent 1px),
    linear-gradient(90deg,rgba(25,183,239,.014) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 80% 0%,rgba(25,183,239,.07) 0%,transparent 45%),
    radial-gradient(ellipse at 0% 100%,rgba(141,92,255,.04) 0%,transparent 40%);
  pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(25,183,239,.2);border-radius:2px;}

/* ── LOGIN ── */
#loginScreen{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at 30% 40%,rgba(25,183,239,.09),transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(141,92,255,.06),transparent 45%),var(--bg);
}
.lbox{
  width:420px;
  max-width:94vw;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  background:rgba(7,16,30,.97);
  border:1px solid rgba(25,183,239,.18);
  box-shadow:0 0 0 1px rgba(25,183,239,.06),0 40px 80px rgba(0,0,0,.8);
}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue) 40%,var(--purple) 70%,transparent);}
.lbox-top{padding:32px 36px 24px;text-align:center;border-bottom:1px solid var(--border);}
.lbox-logo{font-family:var(--cond);font-weight:900;font-size:28px;letter-spacing:2.5px;
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;}
.lbox-logo span{color:var(--blue);}
.lbox-ver{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;}
.lbox-desc{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.6;}
.lbox-form{padding:24px 36px 32px;}
.lf-lbl{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--muted);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px;display:block;}
.lf-in{width:100%;padding:12px 15px;border-radius:11px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);color:var(--text);font-size:13px;font-family:var(--sans);
  outline:none;transition:border-color .2s;margin-bottom:13px;}
.lf-in:focus{border-color:rgba(25,183,239,.45);background:rgba(25,183,239,.02);}
.lf-hub{display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.hub-tag{padding:5px 12px;border-radius:7px;background:rgba(25,183,239,.08);
  border:1px solid rgba(25,183,239,.22);font-size:10px;font-weight:700;color:var(--blue);
  display:flex;align-items:center;gap:6px;}
.hub-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue);
  box-shadow:0 0 6px rgba(25,183,239,.8);}
.hub-note{font-size:11px;color:var(--muted);}
.lf-btn{width:100%;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,#0aa8ff 0%,#0060cc 100%);
  border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;font-weight:800;
  cursor:pointer;font-family:var(--sans);letter-spacing:.2px;
  box-shadow:0 12px 32px rgba(10,168,255,.3);transition:all .18s;}
.lf-btn:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(10,168,255,.42);}
.lf-note{text-align:center;margin-top:13px;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.07em;}
.demo-badge{position:fixed;top:18px;right:18px;z-index:100001;padding:7px 14px;border-radius:20px;
  background:rgba(25,183,239,.1);border:1px solid rgba(25,183,239,.3);
  color:var(--blue);font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;z-index:100000;}

/* ── SHELL ── */
#shell{display:none;height:100vh;max-height:100vh;flex-direction:column;position:relative;z-index:1;overflow:hidden;}

/* ── TOPBAR ── */
#topbar{height:52px;display:flex;align-items:center;padding:0 14px;flex-wrap:nowrap;
  background:rgba(2,6,14,.96);border-bottom:1px solid rgba(25,183,239,.1);
  backdrop-filter:blur(24px);gap:18px;flex-shrink:0;z-index:200;}
.tb-brand{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.tb-logo{font-family:var(--cond);font-weight:900;font-size:20px;letter-spacing:2px;
  color:#fff;display:flex;align-items:center;gap:8px;}
.tb-badge{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.18em;
  padding:3px 8px;border-radius:4px;background:rgba(25,183,239,.12);
  border:1px solid rgba(25,183,239,.28);color:var(--blue);text-transform:uppercase;}
.tb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.tb-tabs{display:flex;gap:1px;}
.tbtab{padding:6px 13px;border-radius:8px;font-size:11px;font-weight:700;
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  transition:all .15s;font-family:var(--sans);white-space:nowrap;position:relative;}
.tbtab.on{background:rgba(25,183,239,.1);color:var(--blue);}
.tbtab:hover:not(.on){background:rgba(255,255,255,.04);color:var(--text);}
.tbtab-badge{position:absolute;top:1px;right:2px;min-width:14px;height:14px;border-radius:7px;
  background:var(--red);color:#fff;font-size:7px;font-weight:900;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);padding:0 3px;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.sys-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;
  color:var(--green);letter-spacing:.06em;}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px rgba(83,255,136,.9);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.tb-clock{font-family:var(--mono);font-size:10px;color:var(--muted);}
@media(max-width:800px){.tb-clock{display:none;}.sys-status span:not(.sys-dot){display:none;}}
.tb-poll{font-family:var(--mono);font-size:9px;color:var(--faint);display:flex;align-items:center;gap:5px;}
.poll-ring{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(25,183,239,.3);
  border-top-color:var(--blue);animation:spin 1.5s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.tb-avatar{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#0aa8ff,#005faa);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;
  cursor:pointer;flex-shrink:0;}

/* ── LAYOUT ── */
#layout{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── SIDEBAR ── */
#sidebar{width:196px;flex-shrink:0;border-right:1px solid var(--border);
  background:rgba(2,6,14,.7);display:flex;flex-direction:column;overflow-y:auto;padding:14px 0;}
@media(max-width:900px){#sidebar{display:none;}}
@media(max-width:1200px){#sidebar{width:160px;}}
.sb-sec{padding:0 10px;margin-bottom:18px;}
.sb-sec-lbl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.2em;
  color:var(--faint);text-transform:uppercase;padding:0 8px;margin-bottom:7px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;
  cursor:pointer;transition:all .12s;margin-bottom:2px;border:1px solid transparent;}
.sb-item:hover{background:rgba(25,183,239,.04);}
.sb-item.on{background:rgba(25,183,239,.09);border-color:rgba(25,183,239,.16);}
.sb-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;}
.sb-label{font-size:11px;font-weight:700;color:var(--muted);}
.sb-item.on .sb-label{color:var(--blue);}
.sb-cnt{margin-left:auto;font-family:var(--mono);font-size:9px;font-weight:600;
  padding:2px 7px;border-radius:5px;}
.cnt-b{background:rgba(25,183,239,.1);color:var(--blue);}
.cnt-o{background:rgba(255,150,30,.1);color:var(--orange);}
.cnt-r{background:rgba(255,59,48,.12);color:var(--red);}
.cnt-g{background:rgba(83,255,136,.08);color:var(--green);}
.cnt-p{background:rgba(141,92,255,.1);color:var(--purple);}
.sb-fleet{margin:auto 10px 10px;padding:12px 14px;border-radius:11px;
  background:var(--card);border:1px solid var(--border);}
.sf-ttl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.16em;
  color:var(--muted);text-transform:uppercase;margin-bottom:9px;}
.sf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sf-k{font-size:10px;color:var(--muted);}
.sf-v{font-family:var(--mono);font-size:11px;font-weight:600;}
.sf-bar{height:2px;border-radius:1px;background:rgba(255,255,255,.05);margin-top:9px;}
.sf-fill{height:2px;border-radius:1px;background:linear-gradient(90deg,var(--blue),var(--green));}
.sf-note{font-family:var(--mono);font-size:8px;color:var(--faint);margin-top:4px;}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;padding:20px 22px;position:relative;min-width:0;}
@media(max-width:700px){#main{padding:14px 12px;}}
.tab{display:none;}
.tab.on{display:block;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi{padding:14px 16px;border-radius:13px;background:var(--card);
  border:1px solid var(--border);position:relative;overflow:hidden;cursor:default;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.9;}
.kpi-b::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.kpi-g::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.kpi-o::before{background:linear-gradient(90deg,transparent,var(--orange),transparent);}
.kpi-y::before{background:linear-gradient(90deg,transparent,var(--yellow),transparent);}
.kpi-r::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.kpi-lbl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.13em;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-family:var(--cond);font-size:26px;font-weight:600;line-height:1;letter-spacing:-.2px;}
.kpi-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:5px;}
.up{color:var(--green);}.dn{color:var(--red);}

/* ── SIGNAL PIPELINE (Kanban) ── */
.pipeline-wrap{margin-bottom:18px;}
.pipeline-lbl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.pipeline-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
@media(max-width:1100px){.pipeline{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.pipeline{grid-template-columns:repeat(2,1fr);}}
.pipe-col{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden;min-height:120px;}
.pipe-hdr{padding:10px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.pipe-title{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.pipe-cnt{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;}
.pipe-body{padding:8px;display:flex;flex-direction:column;gap:6px;}
.pcard{padding:10px 11px;border-radius:9px;background:var(--card2);border:1px solid var(--border2);
  cursor:pointer;transition:all .15s;position:relative;}
.pcard:hover{border-color:rgba(25,183,239,.3);background:var(--card3);transform:translateY(-1px);}
.pcard-sig{font-family:var(--mono);font-size:9px;color:var(--blue);margin-bottom:3px;}
.pcard-name{font-size:11px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-route{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-age{font-family:var(--mono);font-size:8px;color:var(--faint);margin-top:5px;}
.pri-tag{display:inline-flex;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:8px;font-weight:600;margin-top:5px;}
.pri-s{background:rgba(255,255,255,.05);color:var(--faint);}
.pri-p{background:rgba(255,150,30,.1);color:var(--orange);}
.pri-c{background:rgba(141,92,255,.12);color:var(--purple);}
.pipe-empty{padding:16px 12px;text-align:center;font-family:var(--mono);font-size:9px;color:var(--faint);}

/* ── TWO COL SECTION ── */
.two-col{display:grid;grid-template-columns:1fr 360px;gap:14px;margin-bottom:18px;}
@media(max-width:1000px){.two-col{grid-template-columns:1fr;}}

/* ── INTELLIGENCE FEED ── */
.intel-panel{background:var(--card);border:1px solid rgba(141,92,255,.15);
  border-radius:13px;overflow:hidden;}
.panel-hdr{padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;}
.ai-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;
  background:rgba(141,92,255,.1);border:1px solid rgba(141,92,255,.22);
  font-family:var(--mono);font-size:8px;font-weight:700;color:var(--purple);letter-spacing:.1em;}
.intel-feed{padding:10px;display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto;}
.ifeed-item{padding:10px 12px;border-radius:9px;background:var(--card2);border:1px solid var(--border2);
  display:flex;gap:9px;align-items:flex-start;animation:slideR .3s ease both;}
@keyframes slideR{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}
.if-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.if-text{font-size:11px;color:var(--muted);line-height:1.55;flex:1;}
.if-text strong{color:var(--text);}
.if-time{font-family:var(--mono);font-size:8px;color:var(--faint);flex-shrink:0;}

/* ── EXCEPTION QUEUE ── */
.exc-panel{background:var(--card);border:1px solid rgba(255,150,30,.14);
  border-radius:13px;overflow:hidden;}
.exc-hdr{padding:13px 16px;border-bottom:1px solid rgba(255,150,30,.1);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(255,150,30,.04),transparent);}
.exc-badge{padding:3px 9px;border-radius:5px;background:rgba(255,150,30,.12);
  border:1px solid rgba(255,150,30,.25);font-family:var(--mono);font-size:9px;
  font-weight:700;color:var(--orange);}
.exc-list{max-height:260px;overflow-y:auto;}
.exc-item{padding:12px 14px;border-bottom:1px solid var(--border2);display:flex;gap:10px;}
.exc-item:last-child{border-bottom:none;}
.exc-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;}
.ei-r{background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.2);}
.ei-o{background:rgba(255,150,30,.08);border:1px solid rgba(255,150,30,.18);}
.ei-y{background:rgba(255,210,61,.07);border:1px solid rgba(255,210,61,.16);}
.exc-body{flex:1;min-width:0;}
.exc-sig{font-family:var(--mono);font-size:9px;color:var(--blue);margin-bottom:2px;}
.exc-name{font-size:11px;font-weight:800;margin-bottom:3px;}
.exc-detail{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.exc-countdown{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;
  background:rgba(255,59,48,.08);border:1px solid rgba(255,59,48,.16);
  font-family:var(--mono);font-size:8px;font-weight:700;color:var(--red);margin-bottom:6px;}
.exc-acts{display:flex;gap:5px;flex-wrap:wrap;}
.ea{padding:4px 9px;border-radius:5px;font-size:9px;font-weight:700;
  cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;}
.ea-r{background:rgba(255,59,48,.1);color:var(--red);border:1px solid rgba(255,59,48,.2);}
.ea-b{background:rgba(25,183,239,.1);color:var(--blue);border:1px solid rgba(25,183,239,.2);}
.ea-g{background:rgba(83,255,136,.08);color:var(--green);border:1px solid rgba(83,255,136,.18);}
.ea-o{background:rgba(255,150,30,.08);color:var(--orange);border:1px solid rgba(255,150,30,.18);}
.exc-t{font-family:var(--mono);font-size:8px;color:var(--faint);flex-shrink:0;white-space:nowrap;}

/* ── SIGNAL TABLE ── */
.sig-panel{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;}
.sig-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sig-search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid var(--border);}
.sig-search input{background:transparent;border:none;outline:none;color:var(--text);
  font-size:12px;font-family:var(--sans);flex:1;}
.sig-search input::placeholder{color:var(--faint);}
.sig-filter{padding:8px 12px;border-radius:9px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);color:var(--text);font-size:12px;font-family:var(--sans);
  outline:none;cursor:pointer;}
.sig-filter option{background:var(--card);}
.live-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;
  background:rgba(83,255,136,.07);border:1px solid rgba(83,255,136,.18);
  font-family:var(--mono);font-size:8px;font-weight:700;color:var(--green);letter-spacing:.1em;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.2s infinite;}
.tbl{width:100%;border-collapse:collapse;}
.tbl thead tr{background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
.tbl th{padding:9px 13px;text-align:left;font-family:var(--mono);font-size:8px;
  font-weight:600;color:var(--muted);letter-spacing:.13em;text-transform:uppercase;white-space:nowrap;}
.tbl tbody tr{border-bottom:1px solid var(--border2);transition:background .1s;cursor:pointer;}
.tbl tbody tr:hover{background:rgba(25,183,239,.04);}
.tbl tbody tr:last-child{border-bottom:none;}
.tbl td{padding:11px 13px;vertical-align:middle;}
.tbl-sig{font-family:var(--mono);font-size:10px;color:var(--blue);}
.tbl-order{font-family:var(--mono);font-size:8px;color:var(--faint);}
.tbl-name{font-size:12px;font-weight:500;}
.tbl-route{font-size:10px;color:var(--muted);}
.tbl-driver{font-size:11px;}
.tbl-eta{font-family:var(--mono);font-size:11px;font-weight:600;}
.tbl-quote{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green);}
.spill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;
  font-family:var(--mono);font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.s-pending{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);}
.s-routing{background:rgba(141,92,255,.08);border:1px solid rgba(141,92,255,.2);color:var(--purple);}
.s-assigned{background:rgba(25,183,239,.08);border:1px solid rgba(25,183,239,.2);color:var(--blue);}
.s-in_transit{background:rgba(83,255,136,.07);border:1px solid rgba(83,255,136,.2);color:var(--green);}
.s-delivered{background:rgba(83,255,136,.04);border:1px solid rgba(83,255,136,.1);color:rgba(83,255,136,.5);}
.s-cancelled{background:rgba(255,59,48,.07);border:1px solid rgba(255,59,48,.18);color:var(--red);}
.s-problem{background:rgba(255,59,48,.07);border:1px solid rgba(255,59,48,.18);color:var(--red);}
.act-btn{padding:5px 10px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;
  font-family:var(--sans);background:rgba(25,183,239,.1);color:var(--blue);
  border:1px solid rgba(25,183,239,.22);transition:all .15s;}
.act-btn:hover{background:rgba(25,183,239,.2);}
.act-btn.danger{background:rgba(255,59,48,.08);color:var(--red);border-color:rgba(255,59,48,.2);}
.tbl-empty{padding:48px;text-align:center;}
.tbl-empty .ei{font-size:28px;margin-bottom:10px;opacity:.3;}
.tbl-empty .et{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.tbl-empty .es{font-size:11px;color:var(--faint);}

/* ── SMARTPATH TAB ── */
.sp-reasoning{padding:13px 15px;border-radius:10px;
  background:linear-gradient(135deg,rgba(141,92,255,.06),rgba(25,183,239,.03));
  border:1px solid rgba(141,92,255,.18);margin-bottom:10px;}
.spr-lbl{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.14em;
  color:var(--purple);text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.spr-txt{font-size:12px;color:var(--text);line-height:1.65;}
.spr-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.spc{display:inline-flex;padding:3px 8px;border-radius:5px;
  font-family:var(--mono);font-size:8px;font-weight:600;}
.spc-b{background:rgba(25,183,239,.1);border:1px solid rgba(25,183,239,.2);color:var(--blue);}
.spc-g{background:rgba(83,255,136,.08);border:1px solid rgba(83,255,136,.18);color:var(--green);}
.spc-r{background:rgba(255,59,48,.08);border:1px solid rgba(255,59,48,.18);color:var(--red);}
.spc-p{background:rgba(141,92,255,.1);border:1px solid rgba(141,92,255,.2);color:var(--purple);}
.conf-wrap{padding:10px 12px;border-radius:9px;background:rgba(141,92,255,.04);
  border:1px solid rgba(141,92,255,.12);margin-top:10px;}
.conf-lbl{font-family:var(--mono);font-size:8px;color:var(--purple);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.conf-row{display:flex;align-items:center;gap:10px;}
.conf-bar{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.05);}
.conf-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width 2s ease;}
.conf-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue);}
.rstep{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
  background:var(--card2);border:1px solid var(--border2);margin-bottom:6px;}
.rs-n{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;}
.rs-done{background:rgba(83,255,136,.1);border:1px solid rgba(83,255,136,.25);color:var(--green);}
.rs-now{background:rgba(25,183,239,.18);border:1px solid rgba(25,183,239,.5);color:var(--blue);}
.rs-q{background:rgba(25,183,239,.07);border:1px solid rgba(25,183,239,.18);color:var(--blue);}
.rs-dest{background:rgba(83,255,136,.06);border:1px solid rgba(83,255,136,.16);color:var(--green);}
.rs-name{font-size:11px;font-weight:700;margin-bottom:1px;}
.rs-detail{font-family:var(--mono);font-size:9px;color:var(--muted);}
.rs-eta{font-family:var(--cond);font-size:16px;font-weight:900;color:var(--blue);margin-left:auto;}
.rconn{width:2px;height:8px;background:rgba(25,183,239,.14);margin:0 0 6px 11px;}

/* ── SMARTTRACK ── */
.fleet-map{position:relative;height:460px;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);margin-bottom:14px;}
.fleet-map iframe{width:100%;height:100%;border:0;display:block;
  filter:hue-rotate(195deg) saturate(0.85) brightness(0.72);}
.map-lbl{position:absolute;top:10px;left:10px;padding:5px 12px;border-radius:8px;
  background:rgba(2,6,14,.92);border:1px solid rgba(25,183,239,.28);
  font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.1em;}
.drv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:900px){.drv-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.drv-grid{grid-template-columns:1fr;}}
.drv-card{padding:12px;border-radius:11px;background:var(--card2);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;}
.drv-card:hover{border-color:rgba(25,183,239,.25);transform:translateY(-1px);}
.dc-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.dc-av{width:32px;height:32px;border-radius:9px;background:#0d1a28;
  border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;}
.dc-name{font-size:12px;font-weight:800;margin-bottom:1px;}
.dc-status{font-family:var(--mono);font-size:9px;color:var(--muted);}
.dc-eta{margin-left:auto;text-align:right;}
.dc-eta-val{font-family:var(--cond);font-size:20px;font-weight:900;line-height:1;}
.dc-eta-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;}
.dc-route{font-size:10px;color:var(--muted);}
.dc-bar{height:2px;border-radius:1px;background:rgba(255,255,255,.05);margin-top:8px;}
.dc-fill{height:2px;border-radius:1px;transition:width 1s ease;}

/* ── COMMAND TAB ── */
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:900px){.cmd-grid{grid-template-columns:1fr;}}
.panel{padding:16px 18px;border-radius:13px;background:var(--card);border:1px solid var(--border);margin-bottom:12px;}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.panel-ttl{font-size:12px;font-weight:600;}
.panel-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;}
.cmd-act{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;
  border:1px solid var(--border);cursor:pointer;transition:all .15s;margin-bottom:7px;
  background:transparent;width:100%;text-align:left;font-family:var(--sans);}
.cmd-act:hover{border-color:rgba(25,183,239,.3);background:rgba(25,183,239,.04);}
.cmd-ico{font-size:16px;flex-shrink:0;}
.cmd-ttl{font-size:12px;font-weight:800;color:var(--text);}
.cmd-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
.sla-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sla-cell{padding:12px;border-radius:9px;background:var(--card2);text-align:center;}
.sla-tier{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.sla-val{font-family:var(--cond);font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.sla-note{font-size:9px;color:var(--muted);margin-top:3px;}
.loc-panel{padding:10px 12px;border-radius:9px;background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.loc-name{font-size:11px;font-weight:700;display:flex;align-items:center;gap:7px;}
.loc-dot{width:7px;height:7px;border-radius:50%;}
.loc-stat{font-family:var(--mono);font-size:9px;}

/* ── ANALYTICS TAB ── */
.spark-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:700px){.spark-row{grid-template-columns:1fr;}}
.spark-box{padding:14px 16px;border-radius:11px;background:var(--card);border:1px solid var(--border);}
.spark-lbl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.13em;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.spark-val{font-family:var(--cond);font-size:24px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px;}
.bar-w{height:3px;background:rgba(255,255,255,.05);border-radius:2px;}
.bar-f{height:3px;border-radius:2px;}
.vol-chart{display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:6px;}
.vb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.vb{width:100%;border-radius:3px 3px 0 0;background:rgba(25,183,239,.28);}
.vb-lbl{font-family:var(--mono);font-size:8px;color:var(--faint);}
.lb-row{display:grid;grid-template-columns:20px 1fr 60px 60px 60px;
  align-items:center;padding:9px 10px;border-radius:8px;margin-bottom:2px;gap:0;}
.lb-hdr{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.lb-nm{font-size:11px;font-weight:700;}
.lb-vl{font-family:var(--mono);font-size:10px;text-align:right;}
.lb-rk{font-family:var(--cond);font-size:14px;font-weight:900;color:var(--muted);}

/* ── DRAWER ── */
#drawer{position:fixed;right:-480px;top:52px;bottom:0;width:460px;
  background:rgba(3,8,18,.99);border-left:1px solid rgba(25,183,239,.14);
  z-index:8000;transition:right .35s cubic-bezier(.32,1.1,.6,1);
  overflow-y:auto;padding:24px;backdrop-filter:blur(24px);}
#drawer.open{right:0;}
#drawer::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.dr-close{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dr-lbl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.2em;
  color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.dr-title{font-family:var(--sans);font-size:15px;font-weight:500;letter-spacing:0;margin-bottom:18px;line-height:1.3;color:var(--muted);}
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dr-field{padding:11px 13px;border-radius:9px;background:var(--card);border:1px solid var(--border);}
.df-lbl{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.1em;
  color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.df-val{font-size:12px;font-weight:500;color:var(--text);}
.dr-map{height:160px;border-radius:11px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px;}
.dr-map iframe{width:100%;height:100%;border:0;display:block;
  filter:hue-rotate(195deg) saturate(0.9) brightness(0.7);}
.dr-price{padding:12px 14px;border-radius:10px;background:var(--card2);border:1px solid var(--border);margin-bottom:14px;}
.dp-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border2);font-size:11px;}
.dp-row:last-child{border-bottom:none;padding-top:8px;}
.dp-k{color:var(--muted);}
.dp-v{font-family:var(--mono);font-weight:600;}
.dr-status-sel{width:100%;padding:10px 13px;border-radius:9px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);color:var(--text);font-size:12px;font-family:var(--sans);
  outline:none;margin-bottom:12px;cursor:pointer;}
.dr-status-sel option{background:var(--card);}
.dr-acts{display:flex;gap:7px;flex-wrap:wrap;}
.dra{flex:1;padding:10px 12px;border-radius:9px;font-size:11px;font-weight:800;
  cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;text-align:center;}
.dra-p{background:#0aa8ff;color:#fff;}
.dra-g{background:rgba(83,255,136,.1);color:var(--green);border:1px solid rgba(83,255,136,.2);}
.dra-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);}
.dra-d{background:rgba(255,59,48,.1);color:var(--red);border:1px solid rgba(255,59,48,.2);}

/* ── COMMS HUB ── */
#opsChat{position:fixed;bottom:-620px;right:24px;width:400px;
  background:#030c18;border:1px solid rgba(25,183,239,.16);border-radius:18px;
  overflow:hidden;z-index:9999;box-shadow:0 24px 70px rgba(0,0,0,.85);
  transition:bottom .35s cubic-bezier(.32,1.1,.6,1);}
#opsChat.open{bottom:80px;}
.oc-hdr{padding:14px 16px 0;background:linear-gradient(135deg,#08152a,#0d1e32);
  border-bottom:1px solid rgba(255,255,255,.06);}
.oc-hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.oc-brand{display:flex;align-items:center;gap:8px;}
.oc-brand-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px rgba(83,255,136,.8);animation:pulse 2s infinite;}
.oc-ttl{font-size:14px;font-weight:800;}
.oc-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;margin-top:1px;}
.oc-tabs{display:flex;gap:2px;padding-bottom:0;}
.oc-tab{padding:7px 13px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;
  cursor:pointer;border:none;font-family:var(--sans);background:transparent;
  color:var(--muted);transition:all .15s;position:relative;}
.oc-tab.on{background:rgba(25,183,239,.1);color:var(--blue);}
.oc-tab-badge{position:absolute;top:2px;right:3px;min-width:14px;height:14px;border-radius:7px;
  background:var(--red);color:#fff;font-size:7px;font-weight:900;
  display:none;align-items:center;justify-content:center;font-family:var(--mono);padding:0 3px;}
.oc-channel{display:none;flex-direction:column;}
.oc-channel.on{display:flex;}
.oc-msgs{height:240px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;background:#020a14;}
.oc-msg-wrap{display:flex;flex-direction:column;gap:2px;}
.oc-msg-meta{font-family:var(--mono);font-size:8px;color:var(--faint);padding:0 2px;}
.oc-msg-meta.right{text-align:right;color:#666;}
.oc-msg{padding:9px 12px;border-radius:10px;line-height:1.6;max-width:88%;font-size:11px;}
.oc-inbound{background:#0c1a28;border:1px solid rgba(255,255,255,.06);color:var(--text);}
.oc-outbound{background:var(--blue);color:#fff;align-self:flex-end;}
.oc-customer{background:rgba(141,92,255,.15);border:1px solid rgba(141,92,255,.2);color:var(--text);}
.oc-driver{background:#e5e5ea;border:none;color:#111;}
.oc-system{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:var(--muted);font-style:italic;font-size:10px;text-align:center;align-self:center;max-width:100%;}
.oc-inp-area{padding:10px;border-top:1px solid rgba(255,255,255,.06);background:#040c18;}
.oc-inp-row{display:flex;gap:7px;align-items:flex-end;}
.oc-recipient{width:100%;padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.07);
  background:#091422;color:var(--muted);font-size:10px;font-family:var(--mono);
  outline:none;margin-bottom:6px;cursor:pointer;}
.oc-recipient option{background:#091422;}
#ocInput{flex:1;padding:9px 11px;border-radius:9px;border:1px solid rgba(255,255,255,.07);
  background:#091422;color:#fff;font-size:11px;outline:none;font-family:var(--sans);resize:none;height:38px;}
#ocInput:focus{border-color:rgba(25,183,239,.35);}
.oc-send{padding:9px 14px;border:none;border-radius:9px;background:var(--blue);
  color:#fff;font-weight:900;cursor:pointer;font-size:12px;flex-shrink:0;}
#chatFab{position:fixed;bottom:24px;right:24px;height:46px;padding:0 18px;border-radius:23px;
  background:linear-gradient(135deg,#0aa8ff,#005fcc);border:none;color:#fff;
  font-size:12px;font-weight:800;font-family:var(--sans);letter-spacing:.3px;
  cursor:pointer;box-shadow:0 8px 28px rgba(10,168,255,.4),0 0 0 1px rgba(10,168,255,.2);
  display:none;align-items:center;gap:8px;z-index:8500;transition:all .2s;white-space:nowrap;}
#chatFab:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(10,168,255,.55);}
#chatFab-dot{width:7px;height:7px;border-radius:50%;background:#53ff88;box-shadow:0 0 7px rgba(83,255,136,.9);}
#chatFab-unread{min-width:18px;height:18px;border-radius:9px;background:var(--red);
  color:#fff;font-size:9px;font-weight:900;display:none;align-items:center;justify-content:center;
  padding:0 4px;font-family:var(--mono);}

/* ── TOAST ── */
#toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  padding:10px 18px;border-radius:10px;background:#0a1828;
  border:1px solid rgba(83,255,136,.2);box-shadow:0 14px 40px rgba(0,0,0,.6);
  z-index:99999;font-size:11px;font-weight:700;min-width:220px;text-align:center;
  animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>

<!-- LOGIN -->

      </svg>

    </div>
  </div>
